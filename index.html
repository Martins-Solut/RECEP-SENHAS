<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel do Operador</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top,#0f172a,#020617);
  color: white;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* CARD */
.app {
  background: #020617;
  padding: 32px;
  border-radius: 16px;
  width: 380px;
  box-shadow: 0 25px 50px rgba(0,0,0,.6);
  text-align: center;
}

h2 {
  margin-bottom: 24px;
}

/* CAMPOS */
select, input {
  width: 100%;
  padding: 14px;
  margin-bottom: 16px;
  font-size: 16px;
  border-radius: 10px;
  border: 1px solid #334155;
  background: #020617;
  color: white;
  text-align: center;
}

/* REMOVE SETAS ↑ ↓ */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button {
  -webkit-appearance: none;
  margin: 0;
}
input[type=number] {
  -moz-appearance: textfield;
}

/* SENHA + SETA */
.senha-wrapper {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
}

.senha-wrapper input {
  flex: 1;
}

.btn-next {
  width: 52px;
  border-radius: 10px;
  border: none;
  font-size: 22px;
  cursor: pointer;
  background: #334155;
  color: white;
}
.btn-next:hover {
  background: #475569;
}

/* BOTÃO */
button.chamar {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  font-weight: bold;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  background: #2563eb;
  color: white;
}
button.chamar:hover {
  background: #1d4ed8;
}

small {
  display: block;
  margin-top: 12px;
  color: #94a3b8;
}
</style>
</head>

<body>

<div class="app">
  <h2>Painel do Operador</h2>

  <select id="tipo">
    <option value="Exames">Exames</option>
    <option value="Prioridade">Prioridade</option>
    <option value="Resultados">Resultados</option>
  </select>

  <!-- CAMPO SENHA + SETA -->
  <div class="senha-wrapper">
    <input id="numero" type="number" placeholder="Número da senha">
    <button class="btn-next" onclick="proximaSenha()">→</button>
  </div>

  <select id="guiche">
    <option>Guichê 1</option>
    <option>Guichê 2</option>
    <option>Guichê 3</option>
    <option>Guichê 4</option>
    <option>Guichê 5</option>
  </select>

  <button class="chamar" onclick="chamar()">Chamar Senha</button>

  <small>Senha será exibida e gravada no histórico</small>
</div>

<script type="module">
import { initializeApp }
  from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, set, push }
  from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyB_IhJWewS_qlOqUcwli3Mf04wC6D3wn5Q",
  authDomain: "recep-senhas.firebaseapp.com",
  databaseURL: "https://recep-senhas-default-rtdb.firebaseio.com",
  projectId: "recep-senhas",
  storageBucket: "recep-senhas.appspot.com",
  messagingSenderId: "906681930470",
  appId: "1:906681930470:web:2083f2455d4794eda42127"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const senhaRef = ref(db,"senhaAtual");
const histRef  = ref(db,"historico");

/* CHAMAR SENHA */
window.chamar = () => {
  if (!numero.value) {
    alert("Digite o número da senha");
    return;
  }

  const dados = {
    tipo: tipo.value,
    numero: Number(numero.value),
    guiche: guiche.value,
    hora: new Date().toLocaleTimeString("pt-BR")
  };

  set(senhaRef, dados);
  push(histRef, dados);
};

/* PRÓXIMA SENHA */
window.proximaSenha = () => {
  const atual = Number(numero.value || 0);
  numero.value = atual + 1;
};
</script>

</body>
</html>
