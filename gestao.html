<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gestão de Atendimentos</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f1f5f9;
  color:#111;
}

#login{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.login-box{
  background:white;
  padding:40px;
  width:320px;
  border-radius:14px;
  box-shadow:0 20px 40px rgba(0,0,0,.2);
  text-align:center;
}

.login-box input{
  width:100%;
  padding:12px;
  margin-top:12px;
  font-size:16px;
}

.login-box button{
  width:100%;
  margin-top:20px;
  padding:12px;
  font-size:16px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

#app{
  display:none;
  padding:40px;
}

.topo{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.filtros{
  margin-bottom:30px;
}

.filtros input{
  padding:6px;
  margin-right:8px;
}

.cards{
  display:flex;
  gap:20px;
  margin-bottom:40px;
}

.card{
  flex:1;
  background:white;
  padding:20px;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,.15);
  text-align:center;
}

.card h3{
  margin:0;
  font-size:16px;
}

.card span{
  display:block;
  font-size:36px;
  font-weight:bold;
  margin-top:10px;
}

.grafico-box{
  max-width:600px;
  margin:0 auto;
  background:white;
  padding:20px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,.15);
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h2>Gestão de Atendimentos</h2>
    <input type="password" id="senha" placeholder="Senha">
    <button onclick="entrar()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <div class="topo">
    <h1>Resumo de Atendimentos</h1>
    <button onclick="exportarPDF()" style="
      padding:10px 18px;
      background:#16a34a;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
    ">📄 Exportar PDF</button>
  </div>

  <div class="filtros">
    <label>Data inicial:</label>
    <input type="date" id="dataInicio">
    <label>Data final:</label>
    <input type="date" id="dataFim">
    <button onclick="carregarDados()">Filtrar</button>
  </div>

  <div class="cards">
    <div class="card"><h3>Total</h3><span id="total">0</span></div>
    <div class="card"><h3>Exames</h3><span id="exames">0</span></div>
    <div class="card"><h3>Exame Particular</h3><span id="particular">0</span></div>
    <div class="card"><h3>Resultados</h3><span id="resultados">0</span></div>
    <div class="card"><h3>Prioridade</h3><span id="prioridade">0</span></div>
  </div>

  <div class="grafico-box">
    <canvas id="grafico"></canvas>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

/* LOGIN */
window.entrar = () => {
  if (senha.value === "admin123") {
    login.style.display = "none";
    app.style.display = "block";
    zerarDashboard();
  } else {
    alert("Senha incorreta");
  }
};

/* FIREBASE */
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "recep-senhas.firebaseapp.com",
  databaseURL: "https://recep-senhas-default-rtdb.firebaseio.com",
  projectId: "recep-senhas"
};

const appFB = initializeApp(firebaseConfig);
const db = getDatabase(appFB);
const histRef = ref(db, "historico");

let chart = null;

/* ZERAR */
function zerarDashboard(){
  total.innerText = 0;
  exames.innerText = 0;
  particular.innerText = 0;
  resultados.innerText = 0;
  prioridade.innerText = 0;

  if(chart){
    chart.destroy();
    chart = null;
  }
}

/* CONTAR */
function contar(d, cont){
  cont.total++;
  const t = d.tipo.toLowerCase();
  if (t === "exames") cont.exames++;
  if (t === "exame particular") cont.particular++;
  if (t === "resultados") cont.resultados++;
  if (t === "prioridade") cont.prioridade++;
}

/* FILTRAR */
window.carregarDados = async () => {
  zerarDashboard();

  const inicio = dataInicio.value;
  const fim = dataFim.value;

  if (!inicio || !fim) {
    alert("Selecione a data inicial e final");
    return;
  }

  const snap = await get(histRef);
  const dados = Object.values(snap.val() || {});

  let cont = {
    total: 0,
    exames: 0,
    particular: 0,
    resultados: 0,
    prioridade: 0
  };

  dados.forEach(d => {

    /* ✅ IGNORAR SENHA 000 */
    if (Number(d.numero) === 0) return;

    /* ✅ SEM DATA (HISTÓRICO ANTIGO) */
    if (!d.data) {
      contar(d, cont);
      return;
    }

    /* ✅ COM DATA (FILTRO POR PERÍODO) */
    if (d.data >= inicio && d.data <= fim) {
      contar(d, cont);
    }
  });

  total.innerText = cont.total;
  exames.innerText = cont.exames;
  particular.innerText = cont.particular;
  resultados.innerText = cont.resultados;
  prioridade.innerText = cont.prioridade;

  renderGrafico(cont);
};

/* GRAFICO */
function renderGrafico(c){
  chart = new Chart(grafico, {
    type: "bar",
    data: {
      labels: ["Exames", "Exame Particular", "Resultados", "Prioridade"],
      datasets: [{
        data: [c.exames, c.particular, c.resultados, c.prioridade],
        backgroundColor: ["#2563eb", "#eab308", "#16a34a", "#dc2626"]
      }]
    },
    options: {
      plugins: { legend: { display: false } },
      responsive: true
    }
  });
}

/* PDF */
window.exportarPDF = async () => {
  const { jsPDF } = window.jspdf;
  const canvas = await html2canvas(document.getElementById("app"), { scale: 2 });
  const img = canvas.toDataURL("image/png");

  const pdf = new jsPDF("p", "mm", "a4");
  const w = pdf.internal.pageSize.getWidth();
  const h = (canvas.height * w) / canvas.width;

  pdf.addImage(img, "PNG", 0, 0, w, h);
  pdf.save("relatorio-atendimentos.pdf");
};
</script>

</body>
</html>
``
