<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel do Operador</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#0f172a,#020617);
  color: white;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.app {
  background: #020617;
  padding: 30px;
  border-radius: 14px;
  width: 360px;
  box-shadow: 0 20px 40px rgba(0,0,0,.6);
}

h2 {
  text-align: center;
  margin-bottom: 25px;
}

select, input, button {
  width: 100%;
  padding: 14px;
  margin-bottom: 15px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
}

select, input {
  background: #020617;
  color: white;
  border: 1px solid #334155;
}

button {
  font-weight: bold;
  cursor: pointer;
}

.prioridade { background:#dc2626; }
.exames { background:#2563eb; }
.resultados { background:#16a34a; }

small {
  display: block;
  text-align: center;
  color: #94a3b8;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="app">
  <h2>Painel do Operador</h2>

  <select id="tipo" onchange="atualizarCor()">
    <option value="Exames">Exames</option>
    <option value="Prioridade">Prioridade</option>
    <option value="Resultados">Resultados</option>
  </select>

  <input id="numero" type="number" placeholder="Número da senha">

  <select id="guiche">
    <option>Guichê 1</option>
    <option>Guichê 2</option>
    <option>Guichê 3</option>
    <option>Guichê 4</option>
    <option>Guichê 5</option>
  </select>

  <button id="btn" class="exames" onclick="chamar()">
    Chamar Senha
  </button>

  <small>Senha será exibida e gravada no histórico</small>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, set, push }
from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_IhJWewS_qlOqUcwli3Mf04wC6D3wn5Q",
  authDomain: "recep-senhas.firebaseapp.com",
  databaseURL: "https://recep-senhas-default-rtdb.firebaseio.com",
  projectId: "recep-senhas",
  storageBucket: "recep-senhas.appspot.com",
  messagingSenderId: "906681930470",
  appId: "1:906681930470:web:2083f2455d4794eda42127"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const senhaRef = ref(db,"senhaAtual");
const histRef  = ref(db,"historico");

window.chamar = () => {
  const hora = new Date().toLocaleTimeString("pt-BR");

  const dados = {
    tipo: tipo.value,
    numero: Number(numero.value),
    guiche: guiche.value,
    hora: hora
  };

  set(senhaRef,dados);
  push(histRef,dados);

  numero.value="";
};

window.atualizarCor = () => {
  btn.className =
    tipo.value==="Prioridade" ? "prioridade" :
    tipo.value==="Resultados" ? "resultados" :
    "exames";
};
</script>

</body>
</html>
