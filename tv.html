<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel da TV</title>

<style>
body{
  margin:0;
  height:100vh;
  font-family: Arial, sans-serif;
  background:#ffffff;
  text-align:center;
}

/* LOGO */
#logo{
  position:fixed;
  top:14px;
  left:20px;
  height:250px;
}

/* RELÓGIO */
#relogio{
  position:fixed;
  top:14px;
  right:20px;
  font-size:30px;
  font-weight:bold;
  background:#111827;
  color:white;
  padding:10px 18px;
  border-radius:12px;
}

/* CARD */
.card-principal{
  margin:10px auto 30px auto;
  width:460px;
  border-radius:16px;
  padding:40px 20px;
  box-shadow:0 20px 40px rgba(0,0,0,.25);
}

.tipo{ font-size:40px; }
.senha{ font-size:140px; font-weight:bold; }
.guiche{ font-size:34px; margin-top:10px; }

.hora{
  background:white;
  padding:10px;
  border-radius:10px;
  margin-top:20px;
}

/* HISTÓRICO */
.historico{
  display:flex;
  justify-content:center;
  gap:20px;
}


.hist-card{
  width:220px;
  padding:22px;
  border-radius:14px;
  font-size:20px;
  box-shadow:0 8px 25px rgba(0,0,0,.25);
}

.hist-num{
  font-size:48px;
  font-weight:bold;
  margin:12px 0;
}

/* CORES */
.prioridade{ background:#dc2626; color:white; }
.exames{ background:#2563eb; color:white; }
.exame-particular{ background:#eab308; color:black; }
.resultados{ background:#16a34a; color:white; }
</style>
</head>

<body>

<img id="logo" src="logotipo-clinica-censo.png">

<div id="relogio"></div>

<div id="cardPrincipal" class="card-principal exames">
  <div id="tipo"></div>
  <div id="senha">000</div>
  <div id="guiche"></div>
  <div id="hora"></div>
</div>

<div class="historico" id="historico"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "recep-senhas.firebaseapp.com",
  databaseURL: "https://recep-senhas-default-rtdb.firebaseio.com",
  projectId: "recep-senhas"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const senhaRef = ref(db,"senhaAtual");
const histRef  = ref(db,"historico");

/* RELÓGIO */
setInterval(()=>{
  relogio.innerText = new Date().toLocaleTimeString("pt-BR");
},1000);

/* MAPEAMENTO */
function normalizar(tipo){
  return tipo.toLowerCase().trim();
}

function corPorTipo(tipo){
  const t = normalizar(tipo);
  if(t==="prioridade") return "prioridade";
  if(t==="resultados") return "resultados";
  if(t==="exame particular") return "exame-particular";
  return "exames";
}

function prefixo(tipo){
  const t = normalizar(tipo);
  if(t==="prioridade") return "PDI";
  if(t==="resultados") return "RES";
  if(t==="exame particular") return "EXP";
  return "EXM";
}

/* SENHA ATUAL */
onValue(senhaRef, snap=>{
  if(!snap.exists()) return;

  const d = snap.val();

  tipo.innerText = d.tipo;
  senha.innerText =
    prefixo(d.tipo) +
    String(d.numero).padStart(3,"0");

  guiche.innerText = d.guiche;
  hora.innerText = "Chamada às " + d.hora;

  cardPrincipal.className =
    "card-principal " + corPorTipo(d.tipo);

  const voz = new SpeechSynthesisUtterance(
    `Senha ${d.numero}. ${d.tipo}. ${d.guiche}`
  );
  voz.lang="pt-BR";
  speechSynthesis.speak(voz);
});

/* HISTÓRICO */
onValue(histRef,snap=>{
  historico.innerHTML="";
  const dados = Object.values(snap.val()||{}).slice(-5).reverse();

  dados.forEach(d=>{
    historico.innerHTML += `
      <div class="hist-card ${corPorTipo(d.tipo)}">
        <div>${d.tipo}</div>
        <div class="hist-num">
          ${prefixo(d.tipo)}${String(d.numero).padStart(3,"0")}
        </div>
        <div>${d.guiche}</div>
        <small>${d.hora}</small>
      </div>
    `;
  });
});
</script>
</body>
</html>
